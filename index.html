<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Grid Layout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="grid-container">
    <div class="grid-item"><img src="images/image1.jpg" alt="Foggy beach with rock"></div>
    <div class="grid-item"><img src="images/image2.jpg" alt="Living room with white couch"></div>
    <div class="grid-item"><img src="images/image3.jpg" alt="Table with food"></div>
    <div class="grid-item"><img src="images/image4.jpg" alt="Building with red door"></div>
    <div class="grid-item"><img src="images/image5.jpg" alt="Row of white apartment buildings"></div>
    <div class="grid-item"><img src="images/image6.jpg" alt="View of beach from hill"></div>
  </div>

</body>
</html>
